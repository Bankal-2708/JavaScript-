<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project-1(color chnage)</title>
</head>
<style>
  .body {
    background-color: white;
    color: black;
  }

  .nav {
    border: 2px solid black;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #fff;
    outline: 2px solid black;
    outline-offset: 3px;
    margin: 9px;
    text-align: center;
    z-index: 1000;
    box-sizing: border-box;
  }

  .nav:hover {
    background-color: #f8f4f4;
  }


  .nav-item {
    color: black;
    text-decoration: none;
    margin: 15px;
    display: inline-block;
    border: 2px solid black;
    padding: 2px 15px 2px 15px;
    border-radius: 5px;

  }

  .nav-item:hover {
    background-color: #cdc9c9;
    transform: scale(1.2);
    transition: transform 0.4s ease;
  }


  .main {
    margin-top: 80px;
    text-align: center;
  }

  body {
    background: #222;
  }

  .button {
    display: inline-block;
    margin: 5px;
    width: 100px;
    height: 100px;
    border: 2px solid black;
    background-color: red;
  }

  .button:hover{
    transform: scale(1.1);
    transition: transform 0.3s ease;
  }

  #gray{
    background-color: rgb(181, 237, 98);
  }
  #white{
    background-color: #fff;
  }
  #blue{
    background-color: rgb(54, 54, 241);
  }
  #yellow{
    background-color: yellow;
  }
</style>

<body class="body">
  <nav class="nav">
    <a class="nav-item" href="../Index.html">Home</a>
  </nav>

  <main class="main">
    <h1>Color Schema Switcher</h1>

    <span class="button" id="gray"></span>
    <span class="button" id="white"></span>
    <span class="button" id="blue"></span>
    <span class="button" id="yellow"></span>

    <h2>Try clicking on one of the above color</h2>
    <span>to change the background of this page!</span>
  </main>


  <script src="./script.js"></script>
</body>

</html>
