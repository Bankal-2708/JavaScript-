<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project-3(Digital Clock)</title>
</head>
<style>
  .body {
    background-color: rgb(20, 14, 14);
    color: white;
  }

  .nav {
    border: 2px solid black;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #fff;
    outline: 2px solid white;
    outline-offset: 3px;
    margin: 9px;
    text-align: center;
    z-index: 1000;
    box-sizing: border-box;
  }

  .nav:hover {
    background-color: #f8f4f4;
  }


  .nav-item {
    color: black;
    text-decoration: none;
    margin: 15px;
    display: inline-block;
    border: 2px solid black;
    padding: 2px 15px 2px 15px;
    border-radius: 5px;

  }

  .nav-item:hover {
    background-color: #cdc9c9;
    transform: scale(1.2);
    transition: transform 0.4s ease;
  }


  .main {
    margin-top: 80px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #clock {
    font-size: 40px;
    background-color: orange;
    padding: 20px 50px;
    margin-top: 10px;
    border-radius: 10px;

  }

  #time {
    font-size: 40px;
    background-color: orange;
    padding: 20px 50px;
    margin-top: 10px;
    border-radius: 10px;

  }
</style>

<body class="body">
  <nav class="nav">
    <a class="nav-item" href="../Index.html">Home</a>
  </nav>

  <main class="main">
    <h1>Digital Clock</h1>

    <div>
      <h1>Your Local Time</h1>

    </div>

  </main>
  <script src="./script.js"></script>
