<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project-2(BMI Generator)</title>
</head>
<style>
  .body {
    background-color: rgb(20, 14, 14);
    color: white;
  }

  .nav {
    border: 2px solid black;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #fff;
    outline: 2px solid white;
    outline-offset: 3px;
    margin: 9px;
    text-align: center;
    z-index: 1000;
    box-sizing: border-box;
  }

  .nav:hover {
    background-color: #f8f4f4;
  }


  .nav-item {
    color: black;
    text-decoration: none;
    margin: 15px;
    display: inline-block;
    border: 2px solid black;
    padding: 2px 15px 2px 15px;
    border-radius: 5px;

  }

  .nav-item:hover {
    background-color: #cdc9c9;
    transform: scale(1.2);
    transition: transform 0.4s ease;
  }


  .main{
    margin-top: 80px;
    text-align: center;
  }

  .height{
    display: flex;
    gap: 15px;
    justify-content: center;
    align-items: center;
  }

  .input{
    height: 20px;
  }

  .btn{
    padding: 5px 10px 5px 10px;
    border-radius: 4px;
  }

  .btn:hover{
    background-color: #cdc9c9;
    transform: scale(1.1);
    transition: 0.3s ease;
  }

  .result{
    margin: 5px;
    color:red;
  }

</style>

<body class="body">
  <nav class="nav">
    <a class="nav-item" href="../Index.html">Home</a>
  </nav>
  
  <main class="main">
    <form >
      <h1>BMI Calculator</h1>
    <div class="height">
      <h3>Height in CM :</h3>
      <input class="input" id="height" placeholder="Height" type="text">
    </div>
    <div class="height">
      <h3>Weight in KG :</h3>
      <input class="input" id="weight" placeholder="Weight" type="text">
    </div>

    <button class="btn">Calculate</button>
    <div class="result" id="result"></div>
    <div id="compare"></div>

    <h2>BMI Weight Guide</h2>
    <div>
      <h4>Under Weight = Less than 18.6</h4>
      <h4>Normal Range = 18.6 and 24.9 </h4>
      <h4>Overweight = Greater than 24.9 </h4>
    </div>

    </form>
  </main>

  <script src="./script.js"></script>
</body>

</html>
