<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project-4(Guess The Number)</title>
</head>

<style>
  .body {
    background-color: rgb(20, 14, 14);
    color: white;
  }

  .nav {
    border: 2px solid black;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #fff;
    outline: 2px solid white;
    outline-offset: 3px;
    margin: 9px;
    text-align: center;
    z-index: 1000;
    box-sizing: border-box;
  }

  .nav:hover {
    background-color: #f8f4f4;
  }


  .nav-item {
    color: black;
    text-decoration: none;
    margin: 15px;
    display: inline-block;
    border: 2px solid black;
    padding: 2px 15px 2px 15px;
    border-radius: 5px;

  }

  .nav-item:hover {
    background-color: #cdc9c9;
    transform: scale(1.2);
    transition: transform 0.4s ease;
  }


  .main {
    margin-top: 80px;
    text-align: center;
  }

  .game {
    border: 1px solid white;
    width: 70%;
    text-align: center;
    margin: auto;
    background-color: rgb(84, 57, 57);
  }

  #input{
    border-radius: 4px;
    padding: 5px;
    text-align: center;
  }
  #sub{
    margin-top: 10px;
    padding: 5px 10px ;
    background-color: black;
    color: white;
    border-radius: 5px;
  }

  .form{
    display: inline-flex;
    flex-direction: column;
  }
</style>

<body class="body">
  <nav class="nav">
    <a class="nav-item" href="../Index.html">Home</a>
  </nav>

  <main class="main">
    <h1>Number guessing Game</h1>
    <div class="game">
      <p>
        Try guessing number between 1 and 100.
        You have 10 attempts to guess the right number.
      </p>
      <h1>Guess a Number</h1>
      <form class="form">
        <input id="input" type="text" placeholder="Number">
        <input type="submit" id="sub" value="Submit guess" >
      </form>
      <div class="resultParas">
         
        <p> Previous Guess : <span class="guess"></span></span></p>
        <p>Guesses Remaning : <span class="result">10</span> </p>
        <p class="lowOrHi"></p>
      </div>
    </div>
  </main>

  <script src="./script.js"></script>
</body>

</html>
